<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <input type="text" placeholder="Username"/>
        <input type="text" value="+91...">
        <input type="text" value="I accept all T&C" readonly/>
        <button disabled>CLICK</button>
        <input type="text" accesskey="a">
        <input type="checkbox" checked>
        <input type="text" autofocus />
        <p contenteditable="true">Lorem ipsum dolor sit amet.</p>
        <input type="text" draggable="true">
        <div draggable="true">DIV</div>

        <input type="text" minlength="10" maxlength="10">
        <input type="text" required>
        <input type="text" role="textbox">
        <div role="button" style ="font-family: sans-serif; border: 1px solid rgb(70, 3, 45); background:gainsboro">
        <center>
            <div role="alert" style="width:200px; height:100px; border:1px solid">
                <button>OK</button>
            </div>
        </center>
        </div>
    </form>
</body>
</html>
